services:
  mysql:
    image: mysql:8.0
    container_name: welove-shop-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: welove_shop_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p12345678"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: welove-shop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: welove-shop-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: welove_shop_search
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/pg-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "root", "-d", "welove_shop_search"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# Milvus 单机版（etcd + minio + standalone）走独立 compose：
#   docker compose -f milvus-standalone-docker-compose.yml up -d
# 数据卷挂在 backend/volumes/{etcd,minio,milvus}/（.gitignore 忽略入库）

volumes:
  mysql_data:
  redis_data:
  pgdata:
