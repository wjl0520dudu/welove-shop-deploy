# =====================================================================
# product-service 配置(feat/ms-product)
# 端口:8082
# 数据库:PostgreSQL @ localhost:5432 / welove_shop_search / schema=product_svc
# 缓存:Redis @ localhost:6379(商品详情/分类/热门 3 类缓存)
# 注册中心:Nacos @ localhost:8848
# =====================================================================
server:
  port: 8082

spring:
  application:
    name: product-service

  # ---------- Nacos 服务发现 + 配置中心(Modern 接入,Spring Cloud 2023+) ----------
  # SCA 自带 NacosConfigDataLoader,通过 spring.config.import 加载。
  # optional:nacos: 表示 Nacos 连不上时启动不阻塞,降级本地 application*.yml。
  config:
    import:
      # 共享配置(所有服务共用:JWT / Feign / 日志级别)
      - optional:nacos:nacos-common.yml?group=COMMON_GROUP&refreshEnabled=true
      # 本服务私有配置(商品缓存 TTL)
      - optional:nacos:nacos-product-service.yml?group=PRODUCT_GROUP&refreshEnabled=true

  cloud:
    nacos:
      # 服务发现
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:public}
        fail-fast: false
      # 配置中心
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yaml
        refresh-enabled: true

  # ---------- PostgreSQL ----------
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/welove_shop_search?currentSchema=product_svc&stringtype=unspecified
    username: root
    password: 12345678
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: product-svc-hikari
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------- Flyway ----------
  flyway:
    enabled: true
    baseline-on-migrate: true
    default-schema: product_svc
    schemas: product_svc
    locations: classpath:db/migration
    validate-on-migrate: true

  # ---------- Redis ----------
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# ---------- MyBatis-Plus ----------
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ---------- JWT(骨架期与 user-service 一致,方便 token 通用) ----------
jwt:
  secret: ${JWT_SECRET:weloveShop-jwt-secret-key-must-be-at-least-32-characters-for-hs256-algorithm}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}
  header: Authorization
  prefix: "Bearer "

# ---------- 业务开关 ----------
product-service:
  cache:
    # 商品详情缓存 TTL(秒),0 关闭
    product-detail-ttl: 300
    # 分类列表缓存 TTL(秒)
    category-list-ttl: 600
    # 热门商品缓存 TTL(秒)
    hot-products-ttl: 60

# ---------- 管理端点 ----------
management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always
