# =====================================================================
# RocketMQ Broker 配置(骨架阶段最小可用配置)
# 关键点:brokerIP1 必须是宿主机可达 IP,否则本地客户端拿到 broker 地址
#         (docker 内部 IP)后连不上。
# 骨架阶段用 host.docker.internal 让 Windows/Mac Docker Desktop 自动解析。
# 如果你在 Linux 或需要多机访问,请把 brokerIP1 改成宿主机实际 IP(如 192.168.x.x)
# =====================================================================
brokerClusterName = welove-cluster
brokerName = broker-a
brokerId = 0
deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH

# 允许客户端从 broker 拿到的可达地址
brokerIP1 = host.docker.internal

# 允许自动创建 Topic(开发方便,生产要关)
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true
