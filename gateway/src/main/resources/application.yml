# =====================================================================
# gateway 配置(显式路由 + CORS + Sentinel 骨架)
# =====================================================================
server:
  port: 8080

spring:
  application:
    name: gateway
  profiles:
    # 本地默认 dev(读取 application-dev.yml,文件不进 git);
    # 部署时通过环境变量覆盖:SPRING_PROFILES_ACTIVE=prod
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ---------- Nacos 配置中心(Modern 接入,Spring Cloud 2023+) ----------
  # SCA 自带 NacosConfigDataLoader,通过 spring.config.import 加载。
  config:
    import:
      # 共享配置(所有服务共用:日志级别 / Sentinel dashboard)
      - optional:nacos:nacos-common.yml?group=COMMON_GROUP&refreshEnabled=true
      # 本服务私有配置(网关路由 / CORS / 限流规则)
      - optional:nacos:nacos-gateway.yml?group=GATEWAY_GROUP&refreshEnabled=true

  cloud:
    nacos:
      # 服务发现
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:public}
        fail-fast: false
      # 配置中心
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yaml
        refresh-enabled: true

    # ---------- 显式路由(Plan A: /api 归属网关层) ----------
    gateway:
      discovery:
        locator:
          enabled: false                                # 关闭自动路由,全部显式声明
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=2

        - id: trade-service
          uri: lb://trade-service
          predicates:
            - Path=/api/trade/**
          filters:
            - StripPrefix=2

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=2

        - id: admin-bff
          uri: lb://admin-bff
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=2

      # ---------- 全局 CORS ----------
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  # ---------- 非 WebFlux 环境不启 servlet ----------
  main:
    web-application-type: reactive

# ---------- Sentinel(骨架期不配规则,兜底流控留给后面) ----------
sentinel:
  transport:
    dashboard: 127.0.0.1:8080                   # Sentinel 控制台(后序可改)
  eager: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
