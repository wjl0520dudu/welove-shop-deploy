# =====================================================================
# gateway 配置(显式路由 + CORS + Sentinel 骨架)
# =====================================================================
server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        namespace: public
      config:
        import-check:
          enabled: false

    # ---------- 显式路由 ----------
    gateway:
      discovery:
        locator:
          enabled: false                                # 关闭自动路由,全部显式声明
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/product/**
          filters:
            - StripPrefix=1

        - id: trade-service
          uri: lb://trade-service
          predicates:
            - Path=/trade/**
          filters:
            - StripPrefix=1

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/chat/**
          filters:
            - StripPrefix=1

        - id: admin-bff
          uri: lb://admin-bff
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=1

      # ---------- 全局 CORS ----------
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  # ---------- 非 WebFlux 环境不启 servlet ----------
  main:
    web-application-type: reactive

# ---------- Sentinel(骨架期不配规则,兜底流控留给后面) ----------
sentinel:
  transport:
    dashboard: 127.0.0.1:8080                   # Sentinel 控制台(后序可改)
  eager: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
